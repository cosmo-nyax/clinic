<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>にゃくす先生の診察室</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #fef6e9;
      height: 100%;
      overflow: hidden;
    }

    .container {
      position: relative;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
    }

    .main-image {
      width: 100%;
      height: auto;
      display: block;
      position: relative;
      z-index: 1;
    }

    .main-image.glitch {
      animation: glitchEffect 0.5s infinite steps(2, end);
    }

    .main-image::after {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(0deg, rgba(255,255,255,0.03) 0 1px, transparent 1px 2px);
      pointer-events: none;
      mix-blend-mode: overlay;
      z-index: 2;
    }

    @keyframes glitchEffect {
      0% { transform: translate(0, 0); filter: none; }
      20% { transform: translate(-2px, 2px) skewX(5deg); filter: hue-rotate(10deg); }
      40% { transform: translate(2px, -1px) skewY(3deg); filter: contrast(1.2); }
      60% { transform: translate(-1px, 2px); filter: brightness(1.3); }
      80% { transform: translate(1px, -1px); filter: saturate(2); }
      100% { transform: translate(0, 0); filter: none; }
    }

    .fadeout {
      animation: disappear 0.6s ease-out forwards;
    }

    @keyframes disappear {
      0% { opacity: 1; }
      100% { opacity: 0; filter: brightness(10) blur(4px); }
    }

    .button-link {
      position: absolute;
      left: 50%;
      bottom: 32%;
      transform: translateX(-50%);
      width: 75%;
      height: 80px;
      z-index: 3;
    }
  </style>
</head>
<body>
  <div class="container">
    <img
      src="cosmo-nyax-clinic.png"
      alt="診察室"
      class="main-image"
      id="clinicImage"
    />
    <a
      href="javascript:void(0)"
      class="button-link"
      title="診察をはじめる"
      onclick="startGlitch()"
    ></a>
  </div>

  <script>
    function startGlitch() {
      const image = document.getElementById("clinicImage");

      // グリッチ開始
      image.classList.add("glitch");

      // 崩壊（白飛び）へ
      setTimeout(() => {
        image.classList.remove("glitch");
        image.classList.add("fadeout");
      }, 400);

      // 遷移
      setTimeout(() => {
        window.location.href = "https://blue036152.studio.site";
      }, 1000);
    }
  </script>
</body>
</html>
