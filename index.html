<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>にゃくす先生の診察室</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #fef6e9;
      height: 100%;
    }

    .container {
      position: relative;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      overflow: hidden;
    }

    .main-image {
      width: 100%;
      height: auto;
      display: block;
      image-rendering: auto;
      transition: filter 0.1s;
    }

    .button-link {
      position: absolute;
      left: 50%;
      bottom: 32%;
      transform: translateX(-50%);
      width: 75%;
      height: 80px;
      z-index: 10;
    }

    /* 視覚的なノイズ追加 */
    .glitching .main-image {
      animation: glitchVisual 0.3s steps(3, end);
    }

    @keyframes glitchVisual {
      0% { filter: none; }
      25% { filter: contrast(2) brightness(1.5); }
      50% { filter: hue-rotate(20deg) blur(1px); }
      75% { filter: contrast(0.5) brightness(1.2); }
      100% { filter: none; }
    }
  </style>
</head>
<body id="body">
  <div class="container" id="main">
    <img
      src="cosmo-nyax-clinic.png"
      alt="診察室"
      class="main-image"
    />
    <a
      href="https://blue036152.studio.site"
      class="button-link"
      title="診察をはじめる"
      onclick="glitchThenGo(event)"
    ></a>
  </div>

  <script>
    function glitchThenGo(e) {
      e.preventDefault();
      const body = document.getElementById("body");
      const main = document.getElementById("main");

      body.classList.add("glitching");
      main.classList.add("glitching");

      setTimeout(() => {
        window.location.assign(e.currentTarget.href);
      }, 400); // スマホ対策で assign を使用
    }
  </script>
</body>
</html>
