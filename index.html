<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>にゃくす先生の診察室</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #fef6e9;
      height: 100%;
    }

    .container {
      position: relative;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      overflow: hidden;
    }

    .main-image {
      width: 100%;
      height: auto;
      display: block;
      image-rendering: auto;
      transition: filter 0.1s;
    }

    .button-link {
      position: absolute;
      left: 50%;
      bottom: 32%;
      transform: translateX(-50%);
      width: 75%;
      height: 80px;
      z-index: 10;
    }

    /* 🔧 画面全体を揺らすグリッチCSS */
    .glitching {
      animation: screenGlitch 0.3s steps(2, end);
    }

    @keyframes screenGlitch {
      0% { transform: translate(0, 0); }
      20% { transform: translate(-2px, 2px); }
      40% { transform: translate(2px, -2px); }
      60% { transform: translate(-1px, 1px); }
      80% { transform: translate(1px, -1px); }
      100% { transform: translate(0, 0); }
    }

    /* 🔧 白飛び崩壊 */
    .fadeout {
      animation: fadeout 0.6s ease-out forwards;
    }

    @keyframes fadeout {
      0% { filter: none; opacity: 1; }
      25% { filter: contrast(2) blur(1px); }
      50% { filter: hue-rotate(30deg) brightness(1.5); }
      75% { filter: grayscale(1) blur(3px); opacity: 0.8; }
      100% { filter: brightness(10); opacity: 0; }
    }
  </style>
</head>
<body id="body">
  <div class="container" id="main">
    <img
      src="cosmo-nyax-clinic.png"
      alt="診察室"
      class="main-image"
    />
    <a
      href="javascript:void(0)"
      class="button-link"
      title="診察をはじめる"
      onclick="glitchThenDestroy()"
    ></a>
  </div>

  <script>
    function glitchThenDestroy() {
      const body = document.getElementById("body");
      const image = document.querySelector(".main-image");

      // ✅ グリッチ揺れ（bodyにかける）
      body.classList.add("glitching");

      // ✅ 白飛びアニメ（画像にかける）
      setTimeout(() => {
        image.classList.add("fadeout");
      }, 200);

      // ✅ ページ遷移
      setTimeout(() => {
        window.location.href = "https://blue036152.studio.site";
      }, 700);
    }
  </script>
</body>
</html>
