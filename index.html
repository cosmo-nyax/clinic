<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>にゃくす先生の診察室</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #fef6e9;
      height: 100%;
    }

    .container {
      position: relative;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      overflow: hidden;
    }

    .main-image {
      width: 100%;
      height: auto;
      display: block;
      image-rendering: auto;
      transition: filter 0.1s;
    }

    .button-link {
      position: absolute;
      left: 50%;
      bottom: 32%;
      transform: translateX(-50%);
      width: 75%;
      height: 80px;
      z-index: 10;
    }

    /* 視覚的なノイズ追加 */
    .glitching .main-image {
      animation: glitchVisual 0.3s steps(3, end);
    }

    @keyframes glitchVisual {
      0% { filter: none; }
      25% { filter: contrast(2) brightness(1.5); }
      50% { filter: hue-rotate(20deg) blur(1px); }
      75% { filter: contrast(0.5) brightness(1.2); }
      100% { filter: none; }
    }
  </style>
</head>
<body id="body">
  <div class="container" id="main">
    <img
      src="cosmo-nyax-clinic.png"
      alt="診察室"
      class="main-image"
    />
    <a
      href="https://blue036152.studio.site"
      class="button-link"
      title="診察をはじめる"
      onclick="glitchThenGo(event)"
    ></a>
  </div>

 <a href="javascript:void(0)" class="button-link" onclick="glitchThenDestroy()"></a>

<style>
  .fadeout {
    animation: fadeout 0.4s ease-out forwards;
  }

  @keyframes fadeout {
    0% { filter: none; opacity: 1; }
    25% { filter: contrast(2) blur(1px); }
    50% { filter: hue-rotate(30deg) brightness(1.5); }
    75% { filter: grayscale(1) blur(2px); opacity: 0.8; }
    100% { filter: brightness(10); opacity: 0; }
  }
</style>

<script>
  function glitchThenDestroy() {
    const body = document.getElementById("body");
    const main = document.getElementById("main");

    // 揺れ＆視覚ノイズ
    body.classList.add("glitching");
    main.classList.add("glitching");

    // 少し遅れて全体フェードアウト
    setTimeout(() => {
      main.classList.add("fadeout");
    }, 200);

    // 0.6秒後にSTUDIOへ遷移
    setTimeout(() => {
      window.location.href = "https://blue036152.studio.site";
    }, 600);
  }
</script>

</body>
</html>
